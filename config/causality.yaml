test_name: "E3_Causality"
description: "Signal velocity analysis for all TRD field modes - CRITICAL GO/NO-GO gate"

validation:
  framework: "E3 - Mathematical Rigor"
  test_file: "test/test_causality.cpp"
  date: "2026-01-04"
  golden_key: 246.0  # GeV

physics:
  grid_size: 128  # High resolution for wave propagation
  dx: 0.1  # Spatial step (natural units)
  dt: 0.01  # Time step (must satisfy CFL condition: dt < dx/c)

  # TRD parameters
  coupling_K: 1.0  # Kuramoto coupling strength
  mass_gap_delta: 1.0  # Mass gap parameter

  # Initial perturbation for signal propagation
  perturbation_type: "gaussian_pulse"
  perturbation_center: [64, 64, 64]  # Grid center
  perturbation_width: 5.0  # Gaussian width
  perturbation_amplitude: 0.01  # Small amplitude (linear regime)

  # Simulation parameters
  total_time: 10.0  # Total simulation time
  sample_interval: 0.1  # Time between snapshots

  # CFL stability check
  cfl_limit: 1.0  # Maximum CFL number (dx/dt must be >= c)

test_scenarios:
  - name: "R_Field_Propagation"
    description: "Measure R-field (order parameter) wave speed"
    field: "R"
    expected:
      v_signal_max: 1.0  # Speed of light in natural units
      tolerance: 0.01
      measurement_method: "wavefront_tracking"

  - name: "Phase_Gradient_Propagation"
    description: "Measure θ-field gradient wave speed"
    field: "theta_gradient"
    expected:
      v_signal_max: 1.0
      tolerance: 0.01
      measurement_method: "gradient_propagation"

  - name: "Coupled_Mode_Analysis"
    description: "Check coupled R-θ modes for superluminal propagation"
    field: "coupled"
    expected:
      all_modes_subluminal: true
      measurement_method: "fourier_dispersion"

  - name: "Light_Cone_Constraint"
    description: "Verify no information outside light cone"
    field: "all"
    expected:
      light_cone_respected: true
      measurement_method: "causality_cone"

quality_gates:
  - metric: "Maximum signal velocity"
    requirement: "v_max ≤ 1.0 (speed of light)"
    physics_note: "Causality requires all signals v ≤ c"
    critical: true  # STOP gate if failed

  - metric: "Wavefront analysis"
    requirement: "No information outside light cone"
    physics_note: "Signal must be zero for |x - x₀| > c(t - t₀)"
    critical: true

  - metric: "Group velocity"
    requirement: "v_group ≤ c for all frequencies"
    physics_note: "Dispersion relation: ω² = k² + Δ² → v_g = k/ω ≤ 1"
    critical: true

  - metric: "Phase velocity"
    requirement: "v_phase may exceed c (non-physical)"
    physics_note: "Phase velocity ω/k can exceed c but carries no information"
    critical: false

  - metric: "Energy conservation"
    requirement: "Energy drift < 0.01% over simulation"
    physics_note: "Symplectic integration ensures numerical stability"
    critical: false  # Important but not a causality test

# Output configuration
output:
  save_snapshots: true
  snapshot_dir: "output/causality/"
  save_dispersion: true
  save_velocity_profile: true
  save_light_cone: true

# Analysis methods
analysis:
  wavefront_threshold: 0.001  # Amplitude threshold for wavefront detection
  fourier_resolution: 256  # FFT size for dispersion analysis
  velocity_measurement_points: 10  # Number of points for velocity tracking

# Expected physics from TRD theory
theoretical_predictions:
  dispersion_relation: "ω² = k² + Δ²"  # Massive Klein-Gordon type
  group_velocity: "v_g = k/√(k² + Δ²)"  # Always ≤ 1
  phase_velocity: "v_p = ω/k = √(1 + Δ²/k²)"  # Can exceed 1 for small k
  light_speed: 1.0  # Natural units (c = ħ = 1)

# Test verdict criteria
verdict:
  GO: "All signal velocities ≤ c within tolerance"
  NO_GO: "Any signal velocity exceeds c"
  criteria:
    - "max(v_signal) ≤ 1.0 + tolerance"
    - "Light cone constraint satisfied"
    - "No superluminal energy transport"