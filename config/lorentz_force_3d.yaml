# Lorentz Force 3D Validation Configuration
#
# Test: Charged particle dynamics in 3D electromagnetic fields
# Physics: F = q(E + v × B)
# Integration: Boris algorithm (symplectic)
#
# Quality Gates:
#   - Cyclotron frequency: ω within 3% of qB/m
#   - Energy conservation: ΔE/E < 0.01%
#   - Helical pitch: consistent with v_parallel
#   - E×B drift: within 20% (averaged over gyration)

test_scenarios:
  - name: "Cyclotron_Bz"
    description: "Pure B_z field → cyclotron in x-y plane (validates 2D)"
    magnetic_field: [0.0, 0.0, 1.0]
    electric_field: [0.0, 0.0, 0.0]
    particle:
      charge: 1.0
      mass: 1.0
      initial_position: [0.0, 1.0, 0.0]
      initial_velocity: [1.0, 0.0, 0.0]
    integration:
      time_step: 0.01
      num_steps: 1000
    expected:
      cyclotron_frequency: 1.0
      frequency_tolerance: 0.03  # 3%
      energy_tolerance: 0.0001   # 0.01%

  - name: "Cyclotron_Bx"
    description: "Pure B_x field → cyclotron in y-z plane (NEW 3D)"
    magnetic_field: [1.0, 0.0, 0.0]
    electric_field: [0.0, 0.0, 0.0]
    particle:
      charge: 1.0
      mass: 1.0
      initial_position: [0.0, 0.0, 1.0]
      initial_velocity: [0.0, 1.0, 0.0]
    integration:
      time_step: 0.01
      num_steps: 1000
    expected:
      radius_stability: 0.05  # 5%
      energy_tolerance: 0.0001

  - name: "Cyclotron_By"
    description: "Pure B_y field → cyclotron in x-z plane (NEW 3D)"
    magnetic_field: [0.0, 1.0, 0.0]
    electric_field: [0.0, 0.0, 0.0]
    particle:
      charge: 1.0
      mass: 1.0
      initial_position: [1.0, 0.0, 0.0]
      initial_velocity: [0.0, 0.0, 1.0]
    integration:
      time_step: 0.01
      num_steps: 1000
    expected:
      radius_stability: 0.05
      energy_tolerance: 0.0001

  - name: "Helical_Motion"
    description: "General B field with parallel velocity → helical trajectory"
    magnetic_field: [0.0, 0.0, 1.0]
    electric_field: [0.0, 0.0, 0.0]
    particle:
      charge: 1.0
      mass: 1.0
      initial_position: [0.0, 1.0, 0.0]
      initial_velocity: [1.0, 0.0, 0.5]  # v_parallel = 0.5 along B_z
    integration:
      time_step: 0.01
      num_steps: 2000
    expected:
      helical_pitch_tolerance: 0.05  # 5%
      energy_tolerance: 0.0001

  - name: "ExB_Drift"
    description: "Crossed E and B fields → drift perpendicular to both"
    magnetic_field: [0.0, 0.0, 1.0]
    electric_field: [0.0, 1.0, 0.0]
    particle:
      charge: 1.0
      mass: 1.0
      initial_position: [0.0, 0.0, 0.0]
      initial_velocity: [0.0, 0.0, 0.0]
    integration:
      time_step: 0.01
      warmup_steps: 500   # Reach steady state
      measure_steps: 1000 # Measure during steady state
    expected:
      drift_velocity: [1.0, 0.0, 0.0]  # v_drift = E × B / B²
      drift_tolerance: 0.20  # 20% (due to gyration effects)

