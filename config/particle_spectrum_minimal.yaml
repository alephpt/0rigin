# B1 Minimal Test - Single separation value
# For quickly verifying the code runs

simulation:
  grid_size_x: 32  # Very small grid
  grid_size_y: 32
  grid_size_z: 16
  spacing: 1.0
  dt: 0.01

parameter_scan:
  type: "vortex_separation"
  values: [20.0]  # Just one value

physics:
  coupling_strength: 10.0
  mass_gap: 5.0

relaxation:
  num_steps: 50  # Very few steps
  convergence_check: false
  output_frequency: 25

vortex_configurations:
  single_vortex:
    topology: "point_vortex"
    winding_number: 1
    position: [0.0, 0.0]

  double_vortex:
    topology: "double_vortex"
    winding_number: 2

  triple_vortex:
    topology: "triple_vortex"
    winding_number: 3

analysis:
  export_csv: true
  output_file: "analysis/b1_minimal_test.csv"
  compute_gradients: false
  compute_energy: false

quality_targets:
  baseline: 6.45
  factor_10: 20.7
  factor_5: 41.4
  factor_2: 103.4
  target: 206.768