  # Unit conversions (phenomenological calibration)
  TRD_to_erg: 1.0e40             # Energy scale
  TRD_to_cm: 1.0e5               # Length scale (100 km/unit)
  TRD_to_sec: 1.0e-3             # Time scale (1 ms/step)

