# Fast Radio Bursts (FRBs) are millisecond-duration radio transients with energies 10³⁸-10⁴⁰ erg.
# TRD explains FRBs as vortex-antivortex annihilation events in neutron star interiors.
#
# Mechanism:
#   1. Neutron star contains vortex lattice (quantized superfluid)
#   2. Stress accumulation → vortex pairs approach
#   3. Critical separation d < 2ξ → annihilation
#   4. Energy release: ΔE ~ K·ξ³·ΔR²
#   5. Coherent EM burst: τ ~ ξ/c
#
# Scaling Law:
