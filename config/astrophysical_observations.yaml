  glitch_max: 1.0e-4             # Largest observed glitches
  glitch_typical: 1.0e-6         # Δν/ν ~ 10⁻⁶

  # Magnetar flare
  flare_energy_min_erg: 1.0e42   # Small flares
  flare_energy_max_erg: 1.0e47   # Giant flares
  flare_energy_typical_erg: 1.0e44  # Typical magnetar burst

  # Energy conservation (all simulations)
