# Josephson Junction Validation Configuration
#
# Test: D2 - Hardware Experimental Signature
# Physics: AC/DC Josephson effects in superconducting junctions
# Implementation: TRD phase dynamics across barrier
#
# Quality Gates:
#   - DC Josephson: I = I_c·sin(Δθ) with < 20% error
#   - AC Josephson: f/V = 2e/h within 10%

validation:
  framework: "D2 - Josephson Junction (Hardware Test)"
  test_file: "test/test_josephson_junction.cpp"
  date: "2026-01-04"
  golden_key: "1 TRD unit = 246 GeV"

physics:
  description: |
    Josephson junction: two superconductors separated by thin insulator

    DC Effect: Supercurrent I = I_c·sin(θ_L - θ_R) at zero voltage
    AC Effect: Applied voltage V generates oscillation at f = (2e/h)·V

    TRD Analog:
      - Superconductors: High R-field (synchronized phases)
      - Barrier: Low R-field (reduced synchronization)
      - Phase difference drives current through junction
      - Time-varying phase creates voltage

  grid_size: 64
  grid_y: 8
  grid_z: 8

  coupling_strength: 1.0
  time_step: 0.01

junction_geometry:
  left_region:
    R_value: 1.0          # Superconducting (high sync)
    theta_locked: true
    theta_value: 0.0
    position: "x < barrier_center"

  barrier:
    R_value: 0.5          # Reduced synchronization
    thickness: 4.0        # Grid points
    center: 32            # Grid coordinate

  right_region:
    R_value: 1.0          # Superconducting
    theta_driven: true
    position: "x > barrier_center"

test_scenarios:
  - name: "DC_Josephson"
    description: "Static phase difference → supercurrent"
    type: "current_measurement"

    phase_differences:
      - 0.0
      - 0.5
      - 1.0
      - 1.5708  # π/2
      - 2.0
      - 3.1416  # π

    drive_frequency: 0.0
    relaxation_steps: 10

    expected:
      relationship: "I = I_c·sin(Δθ)"
      fit_tolerance: 0.20  # 20%

  - name: "AC_Josephson"
    description: "Driven phase → voltage-frequency relation"
    type: "voltage_measurement"

    phase_difference: 0.0

    drive_frequencies:
      - 0.1
      - 0.5
      - 1.0
      - 2.0

    warmup_steps: 100
    measure_steps: 200

    expected:
      josephson_constant: 0.3183  # 2e/h = 1/π in natural units
      tolerance: 0.1              # 10%
      physics: "K_J = 2e/h = 483.6 MHz/μV (SI units)"

quality_metrics:
  - metric: "DC Josephson current"
    requirement: "I = I_c·sin(Δθ) with < 20% fit error"
    validation: "Supercurrent follows sinusoidal phase relation"

  - metric: "Critical current existence"
    requirement: "Well-defined I_c extracted from measurements"
    validation: "Maximum current at Δθ = π/2"

  - metric: "AC Josephson frequency"
    requirement: "f/V = 2e/h within 10%"
    physics: "K_J = 483.6 MHz/μV (universal constant)"
    validation: "Voltage-frequency relation universal across drive frequencies"

  - metric: "Barrier thickness scaling"
    requirement: "I_c decreases with barrier thickness"
    future: "Test I_c ∝ exp(-d/ξ) where ξ is coherence length"

calibration:
  natural_units:
    ℏ: 1.0
    c: 1.0
    e: 1.0

  josephson_constant_natural: 0.3183  # 2e/h = 1/π
  josephson_constant_SI: 483.6  # MHz/μV

  trd_energy_scale: 246  # GeV

  note: |
    In natural units (ℏ = c = e = 1):
      K_J = 2e/h = 2/(2π) = 1/π ≈ 0.3183

    In SI units:
      K_J = 483.597 GHz/mV = 483.6 MHz/μV

    With 1 TRD unit = 246 GeV, we can calibrate voltage/frequency
    ratios to match experimental superconducting junctions.

experimental_context:
  discovered: 1962
  discoverer: "Brian Josephson"
  nobel_prize: 1973

  applications:
    - "SQUID magnetometers (10^-15 T sensitivity)"
    - "Voltage standards (NIST definition)"
    - "Quantum computing (superconducting qubits)"
    - "THz radiation sources"

  typical_parameters:
    critical_current: "1 nA - 1 mA"
    barrier_thickness: "1-2 nm (Al₂O₃, MgO)"
    operating_temperature: "< 10 K (Nb junctions)"
    josephson_frequency: "483.6 GHz at 1 mV"

trd_predictions:
  mechanism: |
    Josephson effect emerges from TRD phase coherence:
      1. Superconductors: R ≈ 1 (fully synchronized)
      2. Barrier: R < 1 (partial synchronization)
      3. Phase gradient drives synchronization current
      4. Current ∝ sin(Δθ) from Kuramoto coupling
      5. Voltage = (ℏ/2e)·∂θ/∂t from gauge theory

  key_insight: |
    Josephson effect is macroscopic manifestation of quantum
    phase coherence - exactly what TRD R-field describes!

    This validates TRD's interpretation:
      R-field = quantum coherence measure
      θ-field = macroscopic quantum phase

    Hardware tests of Josephson junctions provide direct
    experimental validation of TRD phase dynamics.

