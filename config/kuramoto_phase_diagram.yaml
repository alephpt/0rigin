# Kuramoto R(K) Phase Diagram Sweep
#
# Locates the synchronization transition for the 3D lattice Kuramoto model
# with the disorder distribution actually used in TRDCore3D::initializeRandom:
#   g(ω) = N(0, σ=0.1)   on a 64³ lattice, z=6.
#
# The first external critic supplied K_c = 2/(π z g(0)) for Lorentzian g(ω).
# Our distribution is Gaussian, not Lorentzian, so the right comparison is
#   K_c (Gaussian, mean-field) = σ · √(8/π) / z ≈ 0.0836 for σ=0.1, z=6.
#
# This test sweeps K over a logarithmic-ish range that brackets the transition,
# averages global R over multiple random seeds, and reports K_c (R crosses 0.5).
#
# This is the first numerical R(K) measurement on TRD's actual lattice.
# The output is publishable evidence either supporting or refuting the
# three-regime structure described in §2 of the paper.

validation:
  framework: "Kuramoto R(K) Phase Diagram"
  test_file: "test/test_kuramoto_phase_diagram.cpp"

physics_model: "kuramoto_sweep"

physics_params:
  description: |
    Sweep coupling K across {0.005, 0.01, ..., 4.0}; for each K, evolve
    a 64³ lattice from a random initial condition for 2000 burn-in steps,
    then average global R over the next 1000 steps. Repeat with 3 seeds
    {42, 137, 1729} and report mean ± std.
  Nx: 64
  Ny: 64
  Nz: 64
  dt: 0.01
  n_burnin_steps: 2000
  n_average_steps: 1000
  K_values: [0.005, 0.01, 0.02, 0.04, 0.06, 0.08, 0.10, 0.15, 0.20, 0.30, 0.50, 1.00, 2.00, 4.00]
  seeds: [42, 137, 1729]
  disorder_sigma: 0.1     # matches TRDCore3D::initializeRandom default
  coordination_number: 6  # 3D nearest-neighbor

quality_gates:
  # Not pass/fail; this test is exploratory and produces a dataset.
  # The value the rest of the work depends on is K_c_measured, written
  # to summary.yaml in the output directory.

expected_outputs:
  - output/kuramoto_phase_diagram/R_vs_K.csv
  - output/kuramoto_phase_diagram/summary.yaml

notes: |
  Open question: does the measured transition match the mean-field K_c?
  Finite-size effects on a 64³ lattice typically round the transition by
  O(1/√N) and shift K_c upward by O(1/N).  If measured K_c is within
  ~20% of analytic, the mean-field picture holds.
