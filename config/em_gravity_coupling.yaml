test_name: em_gravity_coupling_test
description: "G3: Electromagnetic-Gravity Coupling - Verify EM energy curves spacetime via R-field back-reaction"

# High-energy EM configuration to create measurable T_μν
grid:
  size_x: 128
  size_y: 128

physics:
  solver_type: gpu
  delta: 2.5                    # Planck mass scale Δ = √(ℏc/G)
  coupling: 0.0                 # K=0: disable Kuramoto to isolate EM→R coupling
  dt: 0.0001                    # Small timestep for wave equation stability
  total_steps: 10000
  damping: 0.0
  noise_strength: 0.0
  em_coupling_enabled: true
  em_coupling_strength: 1.0
  em_coupling_type: direct

  # NEW: EM→R gravity coupling
  em_gravity_coupling_enabled: true
  em_energy_density_scale: 1.0  # ε: coupling constant for ΔR ~ ε·ρ_EM

initial_conditions:
  # Localized Gaussian EM pulse for high energy density
  em:
    type: gaussian_pulse
    component: phi              # Stückelberg scalar field
    center: [64, 64]
    width_x: 8.0
    width_y: 8.0
    amplitude: 1.0              # Strong EM field
    k_x: 0.5                    # Wave propagation vector
    k_y: 0.0

  # Flat initial Kuramoto state (no vortex interference)
  kuramoto:
    phase_distribution: uniform
    phase_mean: 0.0
    phase_std: 0.01
    omega_distribution: zero
    omega_mean: 0.0
    omega_std: 0.0

  # No Dirac spinor (pure EM test)
  dirac:
    type: zero

operator_splitting:
  enabled: false

# Theoretical prediction: T_μν^(EM) = (1/4π)[F_μα F_ν^α - (1/4)g_μν F²]
# Energy density: ρ_EM = (1/2)(E² + B²)
# Coupling: ∂R/∂t ~ -∇·T^(EM) or R-field evolves under EM stress-energy
# Expected: ΔR ~ ε·ρ_EM with proportionality constant ε
validation:
  # Quality gate: Coupling matches prediction within 10%
  energy_momentum_coupling_tolerance: 0.10

  # Measure R-field perturbation from EM energy
  r_field_perturbation_expected: true

  # Energy density range (E²+B² for Gaussian pulse)
  expected_em_energy_density_peak: 1.0  # ρ_EM ~ A²

  # Theoretical coupling: ΔR/ρ_EM ≈ ε (dimensionless)
  expected_coupling_constant: 1.0
  coupling_constant_tolerance: 0.10

output:
  directory: output/g3_em_gravity_coupling
  save_every: 100
  formats: [csv]

  # Observables to track
  observables:
    - em_energy_density        # ρ_EM(x,y,t)
    - em_field_strengths       # E(x,y,t), B(x,y,t)
    - r_field                  # R(x,y,t)
    - r_field_gradient         # ∇R(x,y,t)
    - stress_energy_tensor     # T_μν(x,y,t)
    - coupling_ratio           # ΔR/ρ_EM(x,y,t)
