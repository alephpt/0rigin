# Particle Spectrum 3D Configuration
#
# B1 CRITICAL TEST: Validate TRD's prediction that particle masses
# emerge from topological vortex excitations
#
# Physics Model:
#   - Kuramoto phase field θ(x,y,z) supports topological defects
#   - Vortex types: Single (Q=1), Double (Q=2), Triple (Q=3)
#   - Effective mass: m_eff = E_vortex / c²
#   - Vortex energy: E = ∫[(∇θ)² + V(R)] d³x
#
# Critical Quality Gate:
#   m₂/m₁ ≈ 206.768 ± 50% (electron/muon mass ratio)

simulation:
  grid_size: 32
  spacing: 0.5
  dimensions: 3
  coupling_strength: 1.0  # Kuramoto K parameter

physics:
  natural_units: true
  hbar: 1.0
  c_light: 1.0

  vortex_energy_formula: "E = ∫[(∇θ)² + K·R²·(1 - cos(Δθ))] d³x"
  effective_mass: "m_eff = E_vortex / c²"
  topological_charge: "Q = (1/2π)∮∇θ·dl"

test_scenarios:
  - name: "Single_Vortex_Q1"
    description: "Fundamental excitation (Q=1) → Electron-like mass"
    vortex_type: "point_vortex"
    winding_number: 1
    expected:
      charge: 1.0
      charge_tolerance: 0.2

  - name: "Double_Vortex_Q2"
    description: "Second excitation (Q=2) → Muon-like mass"
    vortex_type: "double_vortex"
    winding_number: 2
    separation: 4.0
    expected:
      charge: 2.0
      charge_tolerance: 0.4

  - name: "Triple_Vortex_Q3"
    description: "Third excitation (Q=3) → Tau-like mass"
    vortex_type: "triple_vortex"
    winding_number: 3
    radius: 3.0
    expected:
      charge: 3.0
      charge_tolerance: 0.6

mass_ratios:
  electron_muon:
    experimental: 206.768
    tolerance: 0.5  # ±50% (factor of 2)
    critical: true

  electron_tau:
    experimental: 3477.0
    tolerance: 0.8  # ±80% (exploratory)
    critical: false

validation:
  framework: "B1 Critical Test - Particle Spectrum Derivation"
  test_file: "test/test_particle_spectrum_3d.cpp"
  build_target: "test_particle_spectrum_3d"

  physics_to_validate:
    - "Topological vortex excitations in Kuramoto field"
    - "Energy quantization from topological stability"
    - "Mass spectrum emergence from vortex hierarchy"
    - "Electron/muon mass ratio from Q=1/Q=2 excitations"

  quality_metrics:
    - "Topological charge conservation (Q = n ± 0.2)"
    - "Energy scaling with winding number (E ~ Q)"
    - "Mass ratio m₂/m₁ ≈ 206.768 ± 50% (CRITICAL)"

  theoretical_foundation:
    bekenstein_hawking: "Clustering via gravitational surface tension"
    planck_mass: "Δ = √(ℏc/G) = fundamental mass scale"
    vortex_stability: "Topological protection ensures discrete mass spectrum"

  next_steps:
    if_pass:
      - "Refine vortex configurations for better mass ratios"
      - "Analyze radial modes (n,l,m quantum numbers)"
      - "Map 3 particle families to topological structures"
    if_fail:
      - "Investigate coupling strength K dependence"
      - "Test alternative vortex geometries (knots, links)"
      - "Include R-field feedback (dynamic synchronization)"

success_criteria:
  critical:
    - "m₂/m₁ within factor 2 of 206.768"
    - "Topological charges Q=1,2,3 correctly identified"
    - "Energy increases monotonically with Q"

  exploratory:
    - "m₃/m₁ approaches tau/electron ratio (~3477)"
    - "Energy scaling E(Q) ~ Q·E₁ (linear)"
    - "Stable vortex configurations persist under evolution"

b1_phase1_analysis:
  description: "K-parameter and vortex separation refinement study"
  goal: "Understand vortex interaction energy dependence"
  status: "COMPLETE"

  k_parameter_scan:
    values: [0.0, 0.5, 1.0, 2.0, 5.0]
    fixed_separation: 4.0
    purpose: "Identify if K affects mass hierarchy or just overall scale"
    result: "K affects energy scale, NOT hierarchy structure (m₂/m₁ = 3.35-3.74)"

  vortex_separation_scan:
    values: [2.0, 4.0, 8.0, 16.0]
    fixed_k: 1.0
    purpose: "Measure E_interaction(d) and check if E₂ → 2·E₁ as d → ∞"
    expected: "E₂/(2·E₁) → 1 as d → ∞ (independent limit)"
    result: "E_interaction > 0 always (repulsive), E₂/(2·E₁) → 1 confirmed"

  output:
    file: "analysis/b1_phase1_results.csv"
    format: "K,d,E1,E2,E3,m2_m1,E2_E1,E3_E1,E_interaction"

  missing_physics_identified:
    - "Radial modes (n,l,m quantum numbers)"
    - "R-field feedback (dynamic synchronization)"
    - "Topological stability vs separation"

  conclusion:
    - "Parametric fixes ruled out: 98.2% error is systematic, not parametric"
    - "Radial modes required for larger mass hierarchy"

b1_phase2_analysis:
  description: "Radial mode implementation for larger mass hierarchy"
  goal: "Test if radial quantum numbers (n,l) provide m₂/m₁ > 10"
  status: "ACTIVE"

  radial_wave_functions:
    ground_state_n1: "f_1(r) = A·exp(-r/r₀)"
    first_radial_n2: "f_2(r) = A·(1 - r/2r₀)·exp(-r/r₀)"
    second_radial_n3: "f_3(r) = A·(1 - 2r/3r₀ + 2r²/27r₀²)·exp(-r/r₀)"
    angular_l1: "f_l(r) = A·(r/r₀)·exp(-r/r₀)"

  vortex_ansatz: "θ(r,φ) = Q·φ + f_n(r)"

  test_scenarios:
    - name: "Ground state (1s)"
      config: {Q: 1, n: 1, l: 0}
      description: "Reference baseline (electron-like)"

    - name: "First radial (2s)"
      config: {Q: 1, n: 2, l: 0}
      description: "Radial node excitation"
      expected: "m/m₁ = 4 (hydrogen-like n² scaling)"

    - name: "Second radial (3s)"
      config: {Q: 1, n: 3, l: 0}
      description: "Two radial nodes"
      expected: "m/m₁ = 9 (hydrogen-like n² scaling)"

    - name: "Angular momentum (2p)"
      config: {Q: 1, n: 2, l: 1}
      description: "p-wave excitation"
      expected: "m/m₁ > 1 (angular barrier energy)"

    - name: "Topological Q=2"
      config: {Q: 2, n: 1, l: 0}
      description: "Comparison to Phase 1 result"
      expected: "m/m₁ ≈ 3.65 (Phase 1 baseline)"

  r0_scan:
    values: [2.0, 4.0, 6.0, 8.0]
    purpose: "Identify optimal vortex radius for mass hierarchy"
    fixed_params: {K: 1.0, N: 32, dx: 0.5}

  output:
    file: "analysis/b1_phase2_results.csv"
    format: "Q,n,l,r0,Energy,m_ratio"

  quality_gates:
    minimum: "m₂/m₁ > 10 (significant improvement over Phase 1)"
    target: "m₂/m₁ > 100 (within factor 2 of 206.768)"
    critical: "m₂/m₁ ≈ 206.768 ± 50% (muon/electron ratio)"

  success_criteria:
    - "Radial modes provide larger mass gaps than topological charge"
    - "m(n=2)/m(n=1) > m(Q=2)/m(Q=1)"
    - "Energy scaling consistent with hydrogen-like E_n ∝ 1/n²"

  next_phase:
    if_pass:
      - "Phase 3: R-field self-consistency for binding"
      - "Optimize r₀ and coupling parameters"
      - "Map to particle physics (electron, muon, tau)"
    if_fail:
      - "Phase 3: R-field feedback (alternative approach)"
      - "Phase 4: Topological stability analysis"
      - "Consider non-linear coupling terms"

notes:
  - "This test is MAKE-OR-BREAK for TRD theory"
  - "Success validates topological origin of particle masses"
  - "Failure indicates need for additional physics (radial modes, etc.)"
  - "Memory reference: Bekenstein-Hawking + Planck mass determines scale"
  - "B1 Phase 1: Current m₂/m₁ = 3.65 (target: 206.768, error: 98.2%)"
