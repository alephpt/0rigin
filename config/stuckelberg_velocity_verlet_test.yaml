test_name: stuckelberg_velocity_verlet_test
description: "Stückelberg EM Integration - Velocity Verlet GPU Test"

grid:
  size_x: 128
  size_y: 128

physics:
  solver_type: gpu
  delta: 2.5
  coupling: 0.1
  dt: 0.001
  total_steps: 2000
  K: 0.0  # DISABLE Kuramoto coupling to preserve vortex gradient
  damping: 0.0
  noise_strength: 0.0
  em_coupling_enabled: true
  em_coupling_strength: 1.0
  em_coupling_type: direct

initial_conditions:
  dirac:
    type: gaussian
    center: [64, 64]
    sigma: 5.0
    amplitude: 0.01
  kuramoto:
    phase_distribution: vortex
    vortex_charge: 1
    omega_distribution: zero
    omega_mean: 0.0
    omega_std: 0.0

operator_splitting:
  enabled: false

validation:
  norm_tolerance: 0.01
  energy_tolerance: 0.01
  convergence_tolerance: 0.05

output:
  directory: output/test
  save_every: 100
  formats: [csv]
