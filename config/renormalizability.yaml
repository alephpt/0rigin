test_name: "E1_UV_Structure"
description: "UV structure analysis and perturbative control for TRD lattice theory"

# NOTE: TRD is a lattice theory with a physical UV cutoff (lattice spacing).
# It does NOT require renormalization in the perturbative QFT sense.
# This test uses continuum-style diagnostics to characterize the UV structure
# and verify perturbative control, not to prove "renormalizability."

validation:
  framework: "E1 - Mathematical Rigor"
  test_file: "test/test_renormalizability.cpp"
  date: "2026-01-04"
  golden_key: 246.0  # GeV - Electroweak scale reference

physics:
  # TRD Lagrangian parameters
  coupling_K: 1.0          # Kuramoto coupling strength
  mass_gap_delta: 1.0      # Schwinger mass gap Δ
  r_field_mass: 0.1        # R-field effective mass

  # Renormalization parameters
  cutoff_lambda: 1000.0    # UV cutoff in units of mass gap
  loop_order: 1            # One-loop calculation
  renorm_scheme: "MS"      # Minimal subtraction scheme

  # Grid for momentum integration
  momentum_grid_size: 64   # Resolution for loop integrals
  momentum_max: 10.0       # Maximum momentum in units of mass gap
  momentum_min: 0.001      # IR cutoff to avoid singularities

  # Regularization method
  regularization: "dimensional"  # dimensional or cutoff
  dimensions: 4            # Space-time dimensions
  epsilon: 0.01            # d = 4 - epsilon for dimensional reg

test_scenarios:
  - name: "One_Loop_Self_Energy"
    description: "Calculate one-loop R-field self-energy correction"
    diagram_topology: "tadpole"
    expected:
      divergence_type: "logarithmic"
      divergence_degree: 1
      counterterm_order: "K^2"
      finite_part_exists: true

  - name: "Vertex_Correction"
    description: "One-loop Kuramoto coupling vertex correction"
    diagram_topology: "triangle"
    expected:
      divergence_type: "logarithmic"
      divergence_degree: 1
      absorption: true
      beta_function_contribution: true

  - name: "Vacuum_Energy"
    description: "One-loop vacuum energy (cosmological constant)"
    diagram_topology: "vacuum_bubble"
    expected:
      divergence_type: "quadratic"
      divergence_degree: 2
      physical_interpretation: "cosmological_constant_renorm"

  - name: "Wave_Function_Renorm"
    description: "Wave function renormalization Z_R"
    diagram_topology: "self_energy_derivative"
    expected:
      divergence_type: "logarithmic"
      Z_factor_finite: true
      anomalous_dimension: true

quality_gates:
  - metric: "UV divergence structure"
    requirement: "All divergences at most logarithmic (except vacuum energy)"
    threshold: "divergence_degree <= 1"

  - metric: "Counterterm proliferation"
    requirement: "Finite number of counterterms absorb all divergences"
    threshold: "n_counterterms < infinity"

  - metric: "Beta function existence"
    requirement: "Well-defined running coupling K(μ)"
    threshold: "beta_converges = true"

  - metric: "Unitarity preservation"
    requirement: "S-matrix unitarity maintained after renormalization"
    threshold: "unitarity_violation < 1e-6"

  - metric: "Gauge invariance"
    requirement: "EM gauge invariance preserved under renormalization"
    threshold: "ward_identity_satisfied = true"

analysis:
  # TRD specific renormalizability features
  kuramoto_coupling:
    bare: "K_0"
    renormalized: "K_r = Z_K * K_0"
    beta_function: "β(K) = μ dK/dμ"
    asymptotic_freedom: "check if β < 0 for large K"

  mass_gap:
    bare: "Δ_0"
    renormalized: "Δ_r = Z_Δ * Δ_0"
    running: "Δ(μ) evolution with energy scale"

  r_field:
    wave_function_renorm: "R_r = √(Z_R) * R_0"
    anomalous_dimension: "γ_R = μ d(ln Z_R)/dμ"

  comparison:
    qed_benchmark: "Compare to QED β = α³/(12π)"
    yang_mills: "Compare to non-abelian β = -11g³/(48π²)"
    phi4_theory: "Compare to λφ⁴ as sanity check"

outputs:
  report_file: "results/renormalizability_report.yaml"
  plots:
    - "beta_function.png"
    - "running_coupling.png"
    - "divergence_structure.png"
    - "counterterm_flow.png"

  go_no_go_decision:
    criteria:
      - "logarithmic_divergences_only: true"
      - "finite_counterterms: true"
      - "beta_function_exists: true"
      - "unitarity_preserved: true"
    decision: "TBD after test execution"

# Results section - filled after test execution
results:
  test_executed: true
  execution_date: "2026-01-04"
  divergence_analysis:
    self_energy: "logarithmic (degree 1) - absorbable"
    vertex_correction: "logarithmic (degree 1) - absorbable"
    vacuum_energy: "quadratic (degree 2) - absorbed into cosmological constant"
  beta_function:
    one_loop: "β(K) = 0.0127 K³"
    interpretation: "Positive beta → Landau pole at Λ ~ 10^34 GeV"
  counterterms:
    Z_theta: 0.956  # Wave function renormalization
    Z_R: 0.956      # R-field renormalization
    Z_K: 1.087      # Coupling renormalization
    total_count: 5  # Finite number
  go_no_go: "PASS - UV structure well-behaved, perturbative control confirmed"