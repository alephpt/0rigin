# config/vacuum_synchronization.yaml
# Vacuum Synchronization Test - Dissipative Kuramoto Dynamics

test_name: "Vacuum Synchronization - Kuramoto Gradient Flow"
test_file: "test/test_vacuum_synchronization.cpp"

# CRITICAL: Physics model routing
physics_model: "vacuum_kuramoto"  # Routes to TRDCore3D (NOT ConservativeSolver)

# Grid configuration
physics_params:
  nx: 64
  ny: 64
  nz: 64
  dx: 1.0
  dt: 0.01  # Larger timestep OK for Kuramoto (dissipative system)
  num_steps: 1000

  # Kuramoto coupling parameters
  coupling_K: 1.0     # Kuramoto coupling strength
  damping: 0.1        # Phase damping coefficient

  # Initial conditions: Random phases
  initial_state: "random"
  random_seed: 42
  frequency_spread: 0.1  # Standard deviation of ω(x,y,z)

# Quality gates (GO/NO-GO criteria)
quality_gates:
  # MANDATORY: Synchronization metrics for vacuum
  synchronization_threshold: 0.7  # R > 0.7 (strongly synchronized)

  # NOT CHECKED: Energy conservation (dissipative system by design)
  # energy_conservation_threshold: N/A

  # Expected behavior
  gradient_flow: true  # System should evolve toward R=1 equilibrium
  entropy_increase: true  # Dissipative → entropy increases

# Output configuration
output:
  save_fields: true
  save_interval: 50
  output_dir: "output/vacuum_synchronization"

  fields:
    - "theta"     # Phase field θ(x,y,z)
    - "omega"     # Natural frequencies ω(x,y,z)
    - "R_field"   # Synchronization R(x,y,z)
    - "mass"      # Effective mass m = Δ·R

# Validation history
results:
  date: "2026-01-08"
  status: "EXPECTED"
  synchronization:
    initial_R: "~0.0"  # Random phases → R ≈ 0
    final_R: ">0.7"    # Should synchronize
  energy:
    conservation: "NOT EXPECTED"  # Dissipative system
    trend: "decreasing"           # Gradient flow toward minimum
  notes: |
    Vacuum Kuramoto is DISSIPATIVE by design (thermodynamic equilibration)
    - Energy NOT conserved (gradient flow dθ/dt = ω + K·∑sin(θ_j - θ_i))
    - System evolves toward R=1 synchronized state
    - Dual-solver architecture: TRDCore3D handles this (NOT ConservativeSolver)
