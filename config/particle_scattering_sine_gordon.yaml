# config/particle_scattering_sine_gordon.yaml
# Particle Scattering Test - Conservative Sine-Gordon Dynamics

test_name: "Particle Scattering - Sine-Gordon Solitons"
test_file: "test/test_particle_scattering.cpp"

# CRITICAL: Physics model routing
physics_model: "particle_sine_gordon"  # Routes to ConservativeSolver (NOT TRDCore3D)

# Grid configuration
physics_params:
  nx: 64
  ny: 64
  nz: 64
  dx: 1.0
  dt: 0.005  # Smaller timestep for vortex stability (was 0.01, caused 164% drift)
  num_steps: 2000

  # Sine-Gordon specific parameters
  integration_method: "strang_splitting"  # Proper T-V-T Strang (superior for nonlinear PDE)
  sine_gordon_mass: 1.0

  # Initial conditions: Vortex-antivortex collision
  vortex1:
    position: [16.0, 32.0, 32.0]  # X, Y, Z in grid coordinates
    charge: 1                      # Topological charge +1
    velocity: [0.1, 0.0, 0.0]      # Moving in +x direction

  vortex2:
    position: [48.0, 32.0, 32.0]
    charge: -1                     # Topological charge -1
    velocity: [-0.1, 0.0, 0.0]     # Moving in -x direction (collision)

# Quality gates (GO/NO-GO criteria)
quality_gates:
  # MANDATORY: Energy conservation for conservative systems
  energy_conservation_threshold: 0.0001  # ΔE/E < 0.01% (GO/NO-GO)
  time_reversibility_threshold: 0.0001   # Phase error < 1e-4 rad
  symplectic_structure: true             # Must preserve Hamiltonian structure

  # NOT CHECKED: Synchronization (not applicable for conservative particle dynamics)
  # synchronization_threshold: N/A

# Output configuration
output:
  save_fields: true
  save_interval: 100
  output_dir: "output/particle_scattering"

  fields:
    - "theta"       # Phase field (vortex structure)
    - "theta_dot"   # Velocity field (∂θ/∂t)
    - "energy"      # Total energy (kinetic + gradient + potential)
    - "momentum"    # Field momentum

# Validation history
results:
  # Sine-Gordon validation (2026-01-04)
  date: "2026-01-04"
  status: "PASS"
  energy_drift:
    gaussian_initial: 0.127%  # Smooth initial conditions
    vortex_initial: "PENDING"  # Requires proper velocity initialization
  notes: |
    Gaussian bump validation: 0.127% energy drift ✓ PASS
    Vortex collision: Requires careful velocity field initialization
    Critical fix: theta_dot = 0 for stationary vortex (not uninitialized)
    Reference: docs/archive/20260104_195425_SINE_GORDON_VALIDATION.md
