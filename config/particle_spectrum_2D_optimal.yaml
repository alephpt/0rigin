# B1 Particle Spectrum - 2D Optimal Grid Scan
# Fine-grained scan around optimal region discovered
# Focus: K ∈ [5, 20] × separation ∈ [25, 50]

simulation:
  grid_size_x: 96
  grid_size_y: 96
  grid_size_z: 32
  spacing: 1.0
  dt: 0.01

parameter_scan_2D:
  coupling_strength: [5.0, 7.5, 10.0, 12.5, 15.0, 20.0]
  vortex_separation: [25.0, 30.0, 35.0, 40.0, 45.0, 50.0]
  mass_gap: 5.0  # Fixed at optimal value

relaxation:
  num_steps: 500
  convergence_check: true
  output_frequency: 100

vortex_configurations:
  single_vortex:
    topology: "point_vortex"
    winding_number: 1

  double_vortex:
    topology: "double_vortex"
    winding_number: 2

  triple_vortex:
    topology: "triple_vortex"
    winding_number: 3

analysis:
  export_csv: true
  output_file: "analysis/b1_2D_optimal_scan.csv"
  export_heatmap: true
  compute_all_metrics: true

optimization_target:
  metric: "m2_m1_ratio"
  current_best: 16.812
  improvement_goal: 2.5  # Reach m₂/m₁ > 42 (factor 5 gate)

physics_insights:
  - "K controls synchronization strength"
  - "Separation controls phase gradient magnitude"
  - "Optimal balance: strong enough K for coherence, large enough separation for differentiation"

expected_outcomes:
  conservative: "m₂/m₁ ~ 25-30 (4× baseline)"
  optimistic: "m₂/m₁ ~ 40-50 (factor 5 gate)"
  stretch: "m₂/m₁ ~ 80-100 (approaching factor 2)"

notes:
  - "36 configurations in optimal region"
  - "Expected runtime: ~30 minutes"
  - "Results will determine if architectural changes needed"