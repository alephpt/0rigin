# B1 Particle Spectrum - Coupling Strength (K) Deep Scan
# Based on optimization showing K=10 gives best results
# This config extends the range to explore K ∈ [10, 100]

simulation:
  grid_size_x: 64
  grid_size_y: 64
  grid_size_z: 32
  spacing: 1.0
  dt: 0.01

parameter_scan:
  type: "coupling_strength"
  values: [10.0, 20.0, 30.0, 50.0, 75.0, 100.0]

physics:
  mass_gap: 5.0  # Optimal from Phase 2
  vortex_separation: 30.0  # Optimal from Phase 3

relaxation:
  num_steps: 500
  convergence_check: true
  output_frequency: 100

vortex_configurations:
  single_vortex:
    topology: "point_vortex"
    winding_number: 1
    position: [0.0, 0.0]

  double_vortex:
    topology: "double_vortex"
    winding_number: 2
    separation: 30.0  # Optimal value

  triple_vortex:
    topology: "triple_vortex"
    winding_number: 3
    radius: 22.5  # 0.75 * separation

analysis:
  export_csv: true
  output_file: "analysis/b1_K_extended_scan.csv"

quality_targets:
  baseline: 6.45
  factor_10: 20.7
  factor_5: 41.4
  target: 206.768

notes:
  - "Extended K range based on initial optimization"
  - "K=10 with sep=30 achieved m₂/m₁ = 16.8"
  - "Testing if larger K can reach factor-5 gate (>41.4)"