# B1 Particle Spectrum - Extended Vortex Separation Scan
# Based on strong correlation (0.987) between separation and m₂/m₁
# Extends separation range to d ∈ [30, 100]

simulation:
  grid_size_x: 128  # Larger grid for bigger separations
  grid_size_y: 128
  grid_size_z: 32
  spacing: 1.0
  dt: 0.01

parameter_scan:
  type: "vortex_separation"
  values: [30.0, 40.0, 50.0, 60.0, 80.0, 100.0]

physics:
  coupling_strength: 10.0  # Optimal K
  mass_gap: 5.0  # Optimal Delta

relaxation:
  num_steps: 500
  convergence_check: true
  output_frequency: 100

vortex_configurations:
  single_vortex:
    topology: "point_vortex"
    winding_number: 1
    position: [0.0, 0.0]

  double_vortex:
    topology: "double_vortex"
    winding_number: 2
    # separation set by parameter_scan

  triple_vortex:
    topology: "triple_vortex"
    winding_number: 3
    # radius = 0.75 * separation

analysis:
  export_csv: true
  output_file: "analysis/b1_separation_extended_scan.csv"
  compute_gradients: true
  compute_energy: false  # Skip for speed

quality_targets:
  baseline: 6.45
  factor_10: 20.7  # Need to exceed this
  factor_5: 41.4   # Stretch goal
  factor_2: 103.4  # Ultimate goal
  target: 206.768

hypothesis:
  - "Larger separation → stronger phase gradient between vortices"
  - "Phase gradient drives R-field suppression → larger mass difference"
  - "Optimal separation balances gradient strength vs. field decay"

notes:
  - "Correlation analysis shows separation is KEY parameter (r=0.987)"
  - "d=30 achieved m₂/m₁ = 16.8, nearly 3× baseline"
  - "Extrapolating: d=60 might reach factor-5 gate (>41.4)"