# B1 Quick Test - Two separation values only
# For verifying the extended scan code works

simulation:
  grid_size_x: 64  # Smaller grid for speed
  grid_size_y: 64
  grid_size_z: 32
  spacing: 1.0
  dt: 0.01

parameter_scan:
  type: "vortex_separation"
  values: [30.0, 50.0]  # Just two values for quick test

physics:
  coupling_strength: 10.0  # Optimal K
  mass_gap: 5.0  # Optimal Delta

relaxation:
  num_steps: 200  # Fewer steps for speed
  convergence_check: false
  output_frequency: 100

vortex_configurations:
  single_vortex:
    topology: "point_vortex"
    winding_number: 1
    position: [0.0, 0.0]

  double_vortex:
    topology: "double_vortex"
    winding_number: 2
    # separation set by parameter_scan

  triple_vortex:
    topology: "triple_vortex"
    winding_number: 3
    # radius = 0.75 * separation

analysis:
  export_csv: true
  output_file: "analysis/b1_quick_test.csv"
  compute_gradients: false  # Skip for speed
  compute_energy: false

quality_targets:
  baseline: 6.45
  factor_10: 20.7
  factor_5: 41.4
  factor_2: 103.4
  target: 206.768