  omega_effect:
    description: "Differential rotation creates toroidal field from poloidal"
    formula: "∂B_toroidal/∂t = Ω·∇B_poloidal"
    physical_origin: "Rotation rate varies with latitude"

  growth_rate:
    formula: "γ = αΩ - η"
    condition: "Dynamo operates when γ > 0"
    critical_dynamo_number: "D = αΩL²/η > D_crit ~ 10"

  field_reversals:
    earth: "Every ~500,000 years"
