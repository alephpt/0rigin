# H3: Magnetic Dynamo Mechanism
#
# Test: Can TRD spin currents (∇×∇θ) generate magnetic fields via dynamo mechanism?
# Hypothesis: Topological vortices create quantized magnetic flux
# Prediction: Φ = n·Φ₀ (flux quantization), dynamo growth γ > 0
#
# Physics: J_spin = ∇×∇θ → B = μ₀·J_spin → ∂B/∂t = ∇×(v×B) + η∇²B
# Critical: Validates both E (∂θ/∂t) and B (∇×∇θ) from TRD topology
#
# Quality Gates:
#   1. Flux quantization: Φ/Φ₀ - 1 < 30% (numerical approximation)
#   2. Field persistence: B_residual > 0.01 after vortex moves
#   3. Dynamo growth: γ = αΩ - η > 0.01
#   4. Topological memory: Multi-vortex total flux ≈ 0

test_name: "H3_MagneticDynamo"
description: "Validates magnetic field generation from TRD spin currents"

# Framework
validation:
  framework: "H3 - Magnetic Dynamo Mechanism"
  test_file: "test/test_magnetic_dynamo.cpp"
  executable: "trd"
  date_implemented: "2026-01-05"

# TRD Physics Parameters
physics:
  golden_key_calibration: 246.0  # GeV per TRD unit

  # Grid configuration (vortex tests)
  grid_size_x: 64
  grid_size_y: 64
  grid_size_z: 8   # Thin in z (vortices are 2D in x-y plane)
  dx: 1.0  # Spatial step (TRD units)
  dt: 0.01  # Time step (TRD units)

  # TRD coupling
  coupling_strength: 1.0  # Kuramoto coupling K
  integration_mode: "symplectic"  # RK2 Midpoint Method

  # Vortex parameters
  vortex_winding: 1  # Topological charge Q
  core_radius: 5.0   # Vortex core size (grid units)

  # Dynamo parameters
  differential_rotation: 0.5  # Ω (rotation rate)
  helicity_alpha: 0.2         # α (helical turbulence)
  magnetic_diffusivity: 0.1   # η (resistivity)

  # Physical constants
  flux_quantum: 1.0  # Φ₀ = h/2e (natural units)

# Test Scenarios
test_scenarios:
  - name: "Vortex_Dynamo"
    description: "Topological vortex generates quantized magnetic flux"
    parameters:
      vortex_position: [32, 32, 4]  # Grid center
      winding_number: 1
      core_radius: 5.0

    expected:
      magnetic_flux: 1.0  # Φ = Q·Φ₀
      quantization_tolerance: 0.3  # 30%

    quality_gate:
      metric: "Flux quantization"
      requirement: "Φ/Φ₀ = 1.0 ± 30%"
      physics: "Topological invariant: ∫B·dA = n·Φ₀"

  - name: "Field_Persistence"
    description: "Magnetic field persists after vortex moves (frozen-in flux)"
    parameters:
      grid_size_x: 128
      initial_position: 32   # x-coordinate
      final_position: 96     # x-coordinate (moved)

    expected:
      residual_field_min: 0.01  # Non-zero after vortex moves
      topological_memory: true

    quality_gate:
      metric: "Field persistence"
      requirement: "B_residual > 0.01 (topological memory)"
      physics: "Frozen-in flux: B·L = constant"

  - name: "Alpha_Omega_Dynamo"
    description: "Differential rotation + helicity → exponential field growth"
    parameters:
      grid_size_z: 32
      seed_field: 1.0e-3  # Weak initial field
      omega: 0.5          # Differential rotation
      alpha: 0.2          # Helicity
      eta: 0.1            # Diffusivity
      evolution_steps: 100

    expected:
      growth_rate: 0.05   # γ = αΩ - η > 0
      growth_factor: 1.5  # E_final / E_initial

    quality_gate:
      metric: "Dynamo growth"
      requirement: "γ = αΩ - η > 0.01 (field amplification)"
      physics: "Solar/stellar dynamo mechanism"

  - name: "Multi_Vortex_Flux"
    description: "Vortex-antivortex pair has zero total flux"
    parameters:
      separation: 20.0
      total_winding: 0  # Q_total = +1 + (-1) = 0

    expected:
      total_flux: 0.0
      tolerance: 0.5

    quality_gate:
      metric: "Topological conservation"
      requirement: "Φ_total ≈ 0 for dipole configuration"
      physics: "∮∇θ·dl = 2πQ (winding number conserved)"

# Quality Metrics
quality_metrics:
  - metric: "Spin current density"
    formula: "J_spin = ∇×∇θ"
    requirement: "Concentrated at vortex core"
    validation: "Mixed second derivatives ∂²θ/∂x∂y"

  - metric: "Magnetic flux quantization"
    formula: "Φ = ∫B·dA = n·Φ₀"
    requirement: "Φ/Φ₀ = 1.0 ± 30%"
    physics_basis: "Topological invariant (winding number)"

  - metric: "Field persistence"
    formula: "B_residual / B_initial"
    requirement: "Non-zero after vortex motion"
    physics_basis: "Frozen-in flux theorem (ideal MHD)"

  - metric: "Dynamo growth rate"
    formula: "γ = αΩ - η"
    requirement: "γ > 0.01 (positive growth)"
    physics_basis: "α-Ω dynamo theory (Parker 1955)"

  - metric: "Topological memory"
    formula: "Q_total = Σᵢ Qᵢ"
    requirement: "Total winding conserved"
    physics_basis: "Topological charge conservation"

