test_name: weak_field_limit_validation
description: "A2: Weak Field Limit - Verify SMFT reproduces Newtonian gravity in limit R ≈ 1 + h, |h| ≪ 1"

# Spatial resolution for tracking R-field and test particle
grid:
  size_x: 256
  size_y: 256

physics:
  solver_type: gpu
  delta: 2.5                    # Planck mass scale
  coupling: 0.1                 # Kuramoto coupling K
  dt: 0.001                     # Timestep for stability
  total_steps: 5000             # Long evolution for field stabilization
  damping: 0.05
  noise_strength: 0.0           # Disable noise for clean measurement
  em_coupling_enabled: false    # Pure gravity test

initial_conditions:
  # Small R-field perturbation (weak field)
  kuramoto:
    phase_distribution: uniform
    phase_mean: 0.0
    phase_std: 0.001            # Very small perturbation
    omega_distribution: zero
    omega_mean: 0.0
    omega_std: 0.0

  # No Dirac field for this pure gravity test
  dirac:
    type: zero

operator_splitting:
  enabled: false

# Weak field configuration: Gaussian perturbation in R-field
weak_field:
  enabled: true
  perturbation_type: gaussian   # Gaussian mass perturbation
  perturbation_amplitude: 0.01  # δR ~ 0.01 (|h| ≪ 1)
  perturbation_sigma: 8.0       # Width in grid units
  perturbation_center_x: 128    # Grid center
  perturbation_center_y: 128

# Test particle for tracking gravitational acceleration
test_particle:
  enabled: true
  initial_position_x: 180       # Distance ~52 from center
  initial_position_y: 128
  initial_velocity_x: 0.0
  initial_velocity_y: 0.0

validation:
  # Newtonian gravity quality gate
  acceleration_tolerance: 0.001  # 0.1% error tolerance

  # Expected behavior: g ≈ -∇R (within Newtonian limit)
  expect_gravitational_potential: true

  # Measure at multiple radial distances
  measurement_radii: [20, 40, 60, 80]  # Grid units from center

  # Energy conservation (R-field should be conservative)
  energy_tolerance: 0.01

output:
  directory: output/a2_weak_field_limit
  save_every: 50
  formats: [csv]

  # Track these observables
  observables:
    - r_field                     # R(x,y,t) potential
    - r_field_gradient            # ∇R(x,y,t) acceleration
    - test_particle_position      # (x_p(t), y_p(t))
    - test_particle_velocity      # (v_x(t), v_y(t))
    - test_particle_acceleration  # (a_x(t), a_y(t))
    - newtonian_prediction        # a_Newton(r)
    - acceleration_error          # |a_SMFT - a_Newton|/|a_Newton|
    - r_field_energy              # Total R-field energy
