validation:
  framework: "D4 - Particle Scattering (Soliton Integrity) - Quick Test"
  test_file: "test/test_particle_scattering.cpp"
  description: >
    Quick validation test for TRD soliton elastic scattering.
    Reduced grid size and evolution steps for rapid testing.

physics:
  grid_size: 64          # Reduced from 128
  coupling_strength: 1.0
  mass_gap: 1.0
  time_step: 0.01
  evolution_steps: 1000  # Reduced from 5000
  calibration: "1 TRD unit = 246 GeV (Golden Key)"

collision_scenarios:
  - name: "Head_On_Slow_Quick"
    description: "Low energy head-on collision (v=0.1c) - quick test"
    initial_separation: 20.0  # Reduced from 40.0
    velocity: 0.1
    impact_parameter: 0.0
    expected:
      topology_conserved: true
      energy_drift_max: 0.01
      momentum_conserved: true
      solitons_survive: true
      vortex_count_final: 2

  - name: "Glancing_Low_Quick"
    description: "Non-central collision (b=5, v=0.1c) - quick test"
    initial_separation: 20.0
    velocity: 0.1
    impact_parameter: 5.0
    expected:
      topology_conserved: true
      scattering_angle_nonzero: true
      energy_drift_max: 0.01
      solitons_survive: true

quality_metrics:
  - metric: "Topological charge conservation"
    requirement: "Q_before = Q_after (ΔQ < 0.1)"
    critical: true

  - metric: "Energy conservation"
    requirement: "|ΔE/E| < 1%"
    critical: true

  - metric: "Momentum conservation"
    requirement: "|Δp/p| < 5%"
    critical: true

  - metric: "Soliton survival"
    requirement: "Vortex count = 2 post-collision"
    critical: true

output:
  csv_file: "particle_scattering_quick_results.csv"

golden_key_calibration:
  trd_unit_gev: 246
