test_name: em_wave_propagation
description: "Electromagnetic Wave Propagation Test - Verify c = 1/√(μ₀ε₀)"

grid:
  size_x: 256
  size_y: 64

physics:
  solver_type: gpu
  delta: 0.0  # No mass gap for pure EM test
  coupling: 0.0  # No Dirac feedback
  dt: 0.001
  total_steps: 5000
  K: 0.0  # No Kuramoto coupling for pure EM test
  damping: 0.0
  noise_strength: 0.0
  em_coupling_enabled: true
  em_coupling_strength: 1.0
  em_coupling_type: stuckelberg
  photon_mass: 0.0  # Massless photon for c = 1 propagation

initial_conditions:
  dirac:
    type: zero  # No Dirac field for pure EM test
    center: [128, 32]
    sigma: 0.0
    amplitude: 0.0
  kuramoto:
    phase_distribution: uniform  # Uniform zero phase
    omega_distribution: zero
    omega_mean: 0.0
    omega_std: 0.0
  em_pulse:
    type: gaussian_pulse
    component: A_y  # Vector potential y-component
    center_x: 32  # Start pulse near left boundary
    center_y: 32
    width_x: 8.0  # Spatial width of pulse
    width_y: 8.0
    amplitude: 0.1  # Small amplitude for linear propagation
    wave_vector_x: 10.0  # k_x for initial momentum (positive = rightward)
    wave_vector_y: 0.0  # No y-momentum

operator_splitting:
  enabled: false

validation:
  norm_tolerance: 0.01
  energy_tolerance: 0.05
  convergence_tolerance: 0.05
  expected_wave_speed: 1.0  # c = 1 in natural units
  wave_speed_tolerance: 0.01  # 1% tolerance

output:
  directory: output/em_wave_propagation
  save_every: 50
  formats: [csv]
  track_wave_position: true
  measure_phase_velocity: true